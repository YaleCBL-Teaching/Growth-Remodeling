# =============================================================================
# Exercise 5 — The equilibrated solve as a stability test
# =============================================================================
# Run:     uv run python run.py configs/ex05_equilibrated.yaml
# Read:     docs/06_equilibrated_cmm.md
#
# The equilibrated model sets every rate to zero and solves ONE algebraic
# equation for the final adapted state.  A physical root means the tissue
# adapts; no root means it dilates without bound.  The scan below traces the
# evolved stretch as elastin is lost and marks the stability boundary.
# =============================================================================
title: "Equilibrated solve — stability boundary"
study: equilibrium

insult:
  elastin_surviving: 0.3  # keep 30% of elastin (an aneurysm-type insult)

# Scan one parameter and plot the evolved stretch (NaN where no equilibrium).
scan:
  parameter: insult.elastin_surviving
  start: 0.6
  stop:  0.02
  num:   60
report_critical: elastin  # also print the critical surviving-elastin fraction
