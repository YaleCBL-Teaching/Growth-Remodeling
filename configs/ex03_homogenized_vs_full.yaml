# =============================================================================
# Exercise 3 — Homogenized vs. full constrained mixture
# =============================================================================
# Run:     uv run python run.py configs/ex03_homogenized_vs_full.yaml
# Read:     docs/05_homogenized_cmm.md
#
# The full model stores every past cohort (cost O(N^2)); the homogenized model
# keeps only a mean natural configuration per constituent (two ODEs, O(N)).  Run
# both on the same scenario and read off the agreement and the speed-up printed
# to the terminal.
# =============================================================================
title: "Homogenized vs. full constrained mixture"
study: compare
theories: [constrained_mixture, homogenized_cmm]

insult:
  pressure_factor: 1.5    # hypertension  (try the aneurysm: elastin_surviving: 0.3, ramp: 10)
  t_on: 1.0
  ramp: 1.0

simulate:
  t_end: 2000
  dt: 1.0                 # used by the full model; ignored by the homogenized one
