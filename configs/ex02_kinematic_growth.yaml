# =============================================================================
# Exercise 2 — Kinematic growth of a hypertensive artery
# =============================================================================
# Run:     uv run python run.py configs/ex02_kinematic_growth.yaml
# Read:     docs/03_kinematic_growth.md   (the theory)
#
# Kinematic growth treats the wall as ONE material that thickens to restore its
# prescribed homeostatic stress.  A strong enough pressure step can make the
# artery run away instead.
# =============================================================================
title: "Kinematic growth — hypertensive artery"
study: transient
theory: kinematic_growth

insult:
  pressure_factor: 1.5    # hypertension: sustained +50% pressure
  t_on: 1.0
  ramp: 1.0

simulate:
  k_g: 0.05               # growth-rate gain [1/day]
  t_end: 1500

# Parametric study: one curve per growth-rate gain.  (Or override on the CLI:
#   uv run python run.py configs/ex02_kinematic_growth.yaml --sweep simulate.k_g=0.02,0.05,0.2)
sweep:
  parameter: simulate.k_g
  values: [0.02, 0.05, 0.2]
